name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc-gen-slimrpc-csharp
        run: cargo install agntcy-protoc-slimrpc-plugin --version 1.3.0 --locked

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: buf generate
        run: buf generate
        working-directory: src/SlimA2A.Protos

      - name: dotnet build and test
        run: |
          dotnet build SlimA2A.sln -c Release
          dotnet test SlimA2A.sln -c Release --no-build
